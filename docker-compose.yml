version: '3.8'

services:
  # Service 1: The Website
  web:
    image: mcd-shift-sync:latest
    build: .
    container_name: mcd-shift-sync-web
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:4330 --pythonpath /app/webapp app:app
    ports:
      - "4330:4330"
    volumes:
      - /home/milos/McdScraper:/app/db
    networks:
      - nginx_default
    environment:
      # Keep these static ones here, or move them to the Portainer UI too
      - PYTHONUNBUFFERED=1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - MANAGER_EMAIL=${MANAGER_EMAIL}
      - MANAGER_PASSWORD=${MANAGER_PASSWORD}

  # Service 2: The Background Worker
  worker:
    image: mcd-shift-sync:latest
    build: .
    container_name: mcd-shift-sync-worker
    restart: unless-stopped
    command: python3 /app/sync.py
    volumes:
      - /home/milos/McdScraper:/app/db
    networks:
      - nginx_default
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - MANAGER_EMAIL=${MANAGER_EMAIL}
      - MANAGER_PASSWORD=${MANAGER_PASSWORD}
    depends_on:
      - web

networks:
  nginx_default:
    external: true
