{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">{{ t.link_mcd_account }}</h5>
                </div>
                <div class="card-body">
                    <div id="linkStatus"></div>
                    <form id="linkForm" onsubmit="return linkMcDAccount(event)">
                        <div class="mb-3">
                            <label for="email" class="form-label">{{ t.mcd_email }}</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">{{ t.mcd_password }}</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('dashboard', lang=current_lang) }}" class="btn btn-secondary">{{ t.cancel }}</a>
                            <button type="submit" class="btn btn-primary" id="linkButton">
                                {{ t.link_account }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function linkMcDAccount(event) {
    event.preventDefault();
    
    const form = document.getElementById('linkForm');
    const linkButton = document.getElementById('linkButton');
    const linkStatus = document.getElementById('linkStatus');
    
    // Disable button and show loading state
    linkButton.disabled = true;
    linkButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>{{ t.linking }}';
    
    // Clear any previous status messages
    linkStatus.innerHTML = '';
    
    // Get form data
    const formData = new FormData(form);
    
    // Submit form data
    fetch('{{ url_for("link_mcd", lang=current_lang) }}', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Show success message
            linkStatus.innerHTML = `
                <div class="alert alert-success">
                    <i class="bi bi-check-circle me-2"></i>${data.message}
                </div>
            `;
            
            // Redirect to dashboard after a short delay
            setTimeout(() => {
                window.location.href = '{{ url_for("dashboard", lang=current_lang) }}';
            }, 2000);
        } else {
            // Show error message
            linkStatus.innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>${data.message}
                </div>
            `;
            linkButton.disabled = false;
            linkButton.innerHTML = '{{ t.link_account }}';
        }
    })
    .catch(error => {
        linkStatus.innerHTML = `
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>{{ t.error_occurred }}
                <br>
                <small>${error.message}</small>
            </div>
        `;
        linkButton.disabled = false;
        linkButton.innerHTML = '{{ t.link_account }}';
    });
    
    return false;
}
</script>
{% endblock %}
